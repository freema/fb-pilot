name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (only for manual trigger)'
        required: true
        type: number
      cli:
        description: 'AI CLI to use'
        required: false
        default: 'claude-code'
        type: choice
        options:
          - claude-code
          - codex
      prompt:
        description: 'Additional review instructions (optional)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || format('refs/pull/{0}/head', inputs.pr_number) }}

      - name: Fetch base branch
        run: git fetch origin main

      - uses: freema/codeforge@v1
        with:
          api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          cli: ${{ inputs.cli || 'claude-code' }}
          prompt: ${{ inputs.prompt || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
